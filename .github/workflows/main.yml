name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        include:
          - python-version: "3.10"
            toxenv: py310-django52
          - python-version: "3.11"
            toxenv: py311-django52
          - python-version: "3.12"
            toxenv: py312-django52
          - python-version: "3.13"
            toxenv: py313-django52
          - python-version: "3.14"
            toxenv: py314-django52
          - python-version: "3.12"
            toxenv: py312-django60
          - python-version: "3.13"
            toxenv: py313-django60
          - python-version: "3.14"
            toxenv: py314-django60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tests
        run: python -m tox -e ${{ matrix.toxenv }}
        shell: bash

  package:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Lint and build package
        run: python -m tox -e lint,prepare_npm,release

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: package
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
